<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolas Sebastian Ledezma - CV Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Hero Section -->
    <section id="main" class="hero">

        <div class="dropdown">
            <!-- Imagen seleccionada -->
            <button class="dropdown-btn" onclick="toggleDropdown()">
                <img id="selectedImg" src="images/es.svg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                    <path d="M169.4 374.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 306.7 54.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"/>
                </svg>
            </button>
            <!-- Opciones -->
            <div class="dropdown-content" id="flags_menu">
                <div class="option" onclick="selectOption(this)" data-language="es">
                    <img src="images/es.svg">
                </div>
                <div class="option" onclick="selectOption(this)" data-language="en">
                    <img src="images/gb.svg">
                </div>
            </div>
        </div>
<!--
        <div id="flags" class="flags">
            <div class="flags__item" data-language="es">
                <img src="images/es.svg" alt="">
            </div>
            <div class="flags__item" data-language="en">
                <img src="images/gb.svg" alt="">
            </div>
        </div>
-->
        <div class="container">
            <div class="hero-content">
                <img src="images/profile_photo.jpg" alt="" class="profile-photo" data-placeholder="200">
                <h1 data-section="hero" data-value="title"></h1>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="about section">
        <div class="container">
            <h2 id="about_title" class="section-title" data-section="about" data-value="title"></h2>
            <div class="about-content">
                <div class="about-text">
                    <p data-section="about" data-value="description"></p>
                </div>
                <div class="about-info">
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4 data-section="about" data-value="location"></h4>
                            <p data-section="about" data-value="location_val"></p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4 data-section="about" data-value="email"></h4>
                            <p data-section="about" data-value="email_val"></p>
                        </div>
                    </div>
                    <div class="info-item">
                    <i class="fab fa-linkedin"></i>
                    <div>
                        <h4 data-section="about" data-value="li"></h4>
                        <p data-section="about" data-value="li_val"></p>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="experience section">
        <div class="container">
            <h2 class="section-title" data-section="experience" data-value="title"></h2>
            <div class="timeline">

                <!-- los items se aplican en orden descente -->

                <div class="timeline-item">
                    <div class="timeline-marker"></div>
                    <div class="timeline-content">
                        <h3 data-section="experience" data-value="item_title_4"></h3>
                        <p class="company" data-section="experience" data-value="item_company_4"></p>
                        <div class="date">
                            <i class="fas fa-calendar"></i>
                            <p data-section="experience" data-value="item_date_4"></p>
                        </div>
                        <div class="location">
                            <i class="fas fa-map-marker-alt"></i>
                            <p data-section="experience" data-value="item_location_4"></p>
                        </div>
                        <ul>
                            <li data-section="experience" data-value="item_desc_4_1"></li>
                            <li data-section="experience" data-value="item_desc_4_2"></li>
                            <li data-section="experience" data-value="item_desc_4_3"></li>
                            <li data-section="experience" data-value="item_desc_4_4"></li>
                            <li data-section="experience" data-value="item_desc_4_5"></li>
                            <li data-section="experience" data-value="item_desc_4_6"></li>
                            <li data-section="experience" data-value="item_desc_4_7"></li>
                        </ul>
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="timeline-marker"></div>
                    <div class="timeline-content">
                        <h3 data-section="experience" data-value="item_title_3"></h3>
                        <p class="company" data-section="experience" data-value="item_company_3"></p>
                        <div class="date">
                            <i class="fas fa-calendar"></i>
                            <p data-section="experience" data-value="item_date_3"></p>
                        </div>
                        <div class="location">
                            <i class="fas fa-map-marker-alt"></i>
                            <p data-section="experience" data-value="item_location_3"></p>
                        </div>
                        <ul>
                            <li data-section="experience" data-value="item_desc_3_1"></li>
                            <li data-section="experience" data-value="item_desc_3_2"></li>
                            <li data-section="experience" data-value="item_desc_3_3"></li>
                            <li data-section="experience" data-value="item_desc_3_4"></li>
                            <li data-section="experience" data-value="item_desc_3_5"></li>
                        </ul>
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="timeline-marker"></div>
                    <div class="timeline-content">
                        <h3 data-section="experience" data-value="item_title_2"></h3>
                        <p class="company" data-section="experience" data-value="item_company_2"></p>
                        <div class="date">
                            <i class="fas fa-calendar"></i>
                            <p data-section="experience" data-value="item_date_2"></p>
                        </div>
                        <div class="location">
                            <i class="fas fa-map-marker-alt"></i>
                            <p data-section="experience" data-value="item_location_2"></p>
                        </div>
                        <ul>
                            <li data-section="experience" data-value="item_desc_2_1"></li>
                            <li data-section="experience" data-value="item_desc_2_2"></li>
                            <li data-section="experience" data-value="item_desc_2_3"></li>
                            <li data-section="experience" data-value="item_desc_2_4"></li>
                            <li data-section="experience" data-value="item_desc_2_5"></li>
                            <li data-section="experience" data-value="item_desc_2_6"></li>
                        </ul>
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="timeline-marker"></div>
                    <div class="timeline-content">
                        <h3 data-section="experience" data-value="item_title_1"></h3>
                        <p class="company" data-section="experience" data-value="item_company_1"></p>
                        <div class="date">
                            <i class="fas fa-calendar"></i>
                            <p data-section="experience" data-value="item_date_1"></p>
                        </div>
                        <div class="location">
                            <i class="fas fa-map-marker-alt"></i>
                            <p data-section="experience" data-value="item_location_1"></p>
                        </div>
                        <ul>
                            <li data-section="experience" data-value="item_desc_1_1"></li>
                            <li data-section="experience" data-value="item_desc_1_2"></li>
                            <li data-section="experience" data-value="item_desc_1_3"></li>
                            <li data-section="experience" data-value="item_desc_1_4"></li>
                            <li data-section="experience" data-value="item_desc_1_5"></li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="skills section">
        <div class="container">
            <h2 class="section-title" data-section="skills" data-value="title"></h2>
            <div class="skills-grid">

                <div class="skill-category">
                    <h3>
                        <i class="fa-solid fa-cloud"></i>
                        <p data-section="skills" data-value="subtitle_1"></p>
                    </h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <ul>
                                <li data-section="skills" data-value="value_1_1"></li>
                                <li data-section="skills" data-value="value_1_2"></li>
                                <li data-section="skills" data-value="value_1_3"></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="skill-category">
                    <h3>
                        <i class="fa-solid fa-database"></i> 
                        <p data-section="skills" data-value="subtitle_2"></p>
                    </h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <ul>
                                <li data-section="skills" data-value="value_2_1"></li>
                                <li data-section="skills" data-value="value_2_2"></li>
                                <li data-section="skills" data-value="value_2_3"></li>
                                <li data-section="skills" data-value="value_2_4"></li>
                                <li data-section="skills" data-value="value_2_5"></li>
                                <li data-section="skills" data-value="value_2_6"></li>
                                <li data-section="skills" data-value="value_2_7"></li>
                                <li data-section="skills" data-value="value_2_8"></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="skill-category">
                    <h3>
                        <i class="fa-solid fa-gears"></i>
                        <p data-section="skills" data-value="subtitle_3"></p>
                    </h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <ul>
                                <li data-section="skills" data-value="value_3_1"></li>
                                <li data-section="skills" data-value="value_3_2"></li>
                                <li data-section="skills" data-value="value_3_3"></li>
                                <li data-section="skills" data-value="value_3_4"></li>
                                <li data-section="skills" data-value="value_3_5"></li>
                                <li data-section="skills" data-value="value_3_6"></li>
                                <li data-section="skills" data-value="value_3_7"></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="skill-category">
                    <h3>
                        <i class="fa-solid fa-chart-column"></i>
                        <p data-section="skills" data-value="subtitle_4"></p>
                    </h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <ul>
                                <li data-section="skills" data-value="value_4_1"></li>
                                <li data-section="skills" data-value="value_4_2"></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="skill-category">
                    <h3>
                        <i class="fa-solid fa-code"></i>
                        <p data-section="skills" data-value="subtitle_5"></p>
                    </h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <ul>
                                <li data-section="skills" data-value="value_5_1"></li>
                                <li data-section="skills" data-value="value_5_2"></li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Education Section -->
    <section class="education section">
        <div class="container">
            <h2 class="section-title" data-section="education" data-value="title"></h2>
            <div class="education-grid">
                
                <div class="education-card">
                    <div class="education-header">
                        <h3 data-section="education" data-value="subtitle_1"></h3>
                        <p class="institution" data-section="education" data-value="institution_1"></p>
                    </div>
                    <div class="date">
                        <i class="fas fa-calendar"></i>
                        <p data-section="education" data-value="date_1"></p>
                    </div>
                    <div class="location">
                        <i class="fas fa-map-marker-alt"></i>
                        <p data-section="education" data-value="location_1"></p>
                    </div>
                </div>

                <div class="education-card">
                    <div class="education-header">
                        <h3 data-section="education" data-value="subtitle_2"></h3>
                    </div>
                    <ul class="certification-list">
                        <li data-section="education" data-value="item_2_1"></li>
                        <li data-section="education" data-value="item_2_2"></li>
                    </ul>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-desc">
                <p data-section="footer" data-value="text"></p>
            </div>
            <div class="footer-links">
                <a href="#main" data-section="footer" data-value="button"></a>
            </div>
        </div>
    </footer>

    <script src="js/scripts.js"></script>

</body>
</html>
